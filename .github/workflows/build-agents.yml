name: Build Agents

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      windows_ref:
        description: 'Windows source branch/tag/SHA (default: windows-source)'
        default: 'windows-source'
      macos_ref:
        description: 'macOS source branch/tag/SHA (default: macos-source)'
        default: 'macos-source'
      android_ref:
        description: 'Android source branch/tag/SHA (default: android-source)'
        default: 'android-source'
      linux_ref:
        description: 'Linux source branch/tag/SHA (default: linux-source)'
        default: 'linux-source'

# Architecture: Agent source code lives on dedicated branches (windows-source,
# macos-source, android-source), not on main. Tag-triggered builds checkout the
# latest HEAD of each source branch. For reproducible builds, use
# workflow_dispatch with specific commit SHAs.

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.windows_ref || 'windows-source' }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r agents/windows/requirements.txt pyinstaller
      - name: Build executable
        working-directory: agents/windows
        run: pyinstaller --onefile --noconsole --name live-dashboard-agent agent.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-agent
          path: agents/windows/dist/live-dashboard-agent.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.macos_ref || 'macos-source' }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r agents/macos/requirements.txt pyinstaller
      - name: Build executable
        working-directory: agents/macos
        run: pyinstaller --onefile --windowed --name live-dashboard-agent agent.py
      - uses: actions/upload-artifact@v4
        with:
          name: macos-agent
          path: agents/macos/dist/live-dashboard-agent

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.linux_ref || 'linux-source' }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r agents/linux/requirements.txt pyinstaller
      - name: Build executable
        working-directory: agents/linux
        run: pyinstaller --onefile --name live-dashboard-agent agent.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux-agent
          path: agents/linux/dist/live-dashboard-agent

  # CI 里自动构建 APK 的做法借鉴自社区 fork 作者 @nmb1337
  # （github.com/nmb1337/live-dashboard），感谢他的思路——
  # 此前 APK 一直靠本地构建后手动上传，tag 一打就自动出包省了整个手工环节。
  # 未配置签名 keystore secrets，构建 debug APK（与历史发布一致，功能无差别）。
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.android_ref || 'android-source' }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Build APK
        working-directory: agents/android-app
        run: ./gradlew -q :app:assembleDebug
      - name: Rename APK
        run: cp agents/android-app/app/build/outputs/apk/debug/app-debug.apk live-dashboard.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: live-dashboard.apk

  release:
    needs: [build-windows, build-macos, build-android, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-agent
          path: windows-agent
      - uses: actions/download-artifact@v4
        with:
          name: macos-agent
          path: macos-agent
      - uses: actions/download-artifact@v4
        with:
          name: android-app
          path: android-app
      - uses: actions/download-artifact@v4
        with:
          name: linux-agent
          path: linux-agent
      - name: Prepare release assets
        run: |
          mv windows-agent/live-dashboard-agent.exe .
          mv android-app/live-dashboard.apk .
          mv linux-agent/live-dashboard-agent live-dashboard-agent-linux
          cd macos-agent && zip ../live-dashboard-agent-macos.zip * && cd ..
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            live-dashboard-agent.exe
            live-dashboard-agent-macos.zip
            live-dashboard.apk
            live-dashboard-agent-linux
